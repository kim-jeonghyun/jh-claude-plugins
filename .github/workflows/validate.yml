name: Validate Plugin Manifests

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          echo "Checking marketplace.json..."
          jq . .claude-plugin/marketplace.json > /dev/null

          echo "Checking plugin.json files..."
          find plugins -type f -name plugin.json -exec sh -c 'echo "  {}"; jq . "{}" > /dev/null' \;

          echo "All JSON manifests valid."

      - name: Check SKILL.md description length
        run: |
          EXIT_CODE=0
          export LC_ALL=C.UTF-8
          for skill in $(find plugins -type f -name SKILL.md); do
            desc=$(sed -n 's/^description: //p' "$skill" | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
            len=$(echo -n "$desc" | wc -m | tr -d ' ')
            if [ "$len" -gt 120 ]; then
              echo "FAIL: $skill description is $len chars (max 120)"
              EXIT_CODE=1
            else
              echo "OK: $skill ($len chars)"
            fi
          done
          exit $EXIT_CODE

      - name: Check version-bump requires CHANGELOG update
        if: github.event_name == 'pull_request'
        run: |
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null || git diff --name-only origin/main...HEAD)
          VERSION_BUMPED=0
          for pj in $(echo "$CHANGED_FILES" | grep 'plugin.json$'); do
            echo "Version file changed: $pj"
            VERSION_BUMPED=1
          done
          if [ "$VERSION_BUMPED" -eq 1 ]; then
            if ! echo "$CHANGED_FILES" | grep -q 'CHANGELOG.md'; then
              echo "FAIL: plugin.json version changed but CHANGELOG.md not updated"
              exit 1
            fi
            echo "OK: Version bump has matching CHANGELOG update"
          else
            echo "OK: No version bump detected"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Check internal markdown links
        run: |
          BROKEN=0
          for md in README.md CONTRIBUTING.md CLAUDE.md; do
            if [ ! -f "$md" ]; then continue; fi
            while IFS= read -r link; do
              path="${link%%#*}"   # strip #anchor fragment before checking the file
              if [ -n "$path" ] && [ ! -e "$path" ]; then
                echo "BROKEN: $md -> $link"
                BROKEN=1
              fi
            done < <(grep -o '\[[^]]*\]([^)]*)' "$md" | sed 's/.*(\([^)]*\)).*/\1/' | grep -v '^http')
          done
          if [ "$BROKEN" -eq 1 ]; then
            echo "Broken links found!"
            exit 1
          fi
          echo "All internal links valid."

      - name: Run plugin unit tests
        run: |
          echo "Running plugin unit tests..."
          FOUND=0
          for t in $(find plugins -path '*/tests/test_*.py' | sort); do
            FOUND=1
            echo "== $t =="
            python3 "$t" || exit 1
          done
          if [ "$FOUND" -eq 0 ]; then echo "No plugin tests found."; fi
          echo "All plugin tests passed."

  epubcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate generated EPUBs with epubcheck 5.3.0
        run: |
          curl -sL -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.3.0/epubcheck-5.3.0.zip
          unzip -oq epubcheck.zip
          export EPUBCHECK_JAR="$PWD/epubcheck-5.3.0/epubcheck.jar"
          FOUND=0
          for t in $(find plugins -path '*/tests/test_epubcheck.py' | sort); do
            FOUND=1
            echo "== $t (EPUBCHECK_JAR set) =="
            python3 "$t" || exit 1
          done
          if [ "$FOUND" -eq 0 ]; then echo "No epubcheck tests found."; fi
          echo "EPUB structural validation passed."
